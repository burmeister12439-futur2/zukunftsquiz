// ─── STATE ───
let currentQ = 0;
let scores = {};
TK.forEach(k => scores[k] = 0);
let locked = false;

// ─── NAVIGATION ───
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function startQuiz() {
  currentQ = 0;
  TK.forEach(k => scores[k] = 0);
  showScreen('question');
  renderQuestion();
}

function renderQuestion() {
  locked = false;
  const q = QS[currentQ];
  const pct = Math.round(((currentQ+1)/QS.length)*100);
  document.getElementById('q-counter').textContent = `Frage ${currentQ+1} von ${QS.length}`;
  document.getElementById('q-pct').textContent = pct+'%';
  document.getElementById('q-bar').style.width = pct+'%';
  document.getElementById('q-text').textContent = q.q;
  const wrap = document.getElementById('q-answers');
  wrap.innerHTML = '';
  q.a.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'q-btn fade-in';
    btn.style.animationDelay = (i*80)+'ms';
    btn.textContent = ans.t;
    btn.onclick = () => selectAnswer(i, btn);
    wrap.appendChild(btn);
  });
}

function selectAnswer(idx, btn) {
  if (locked) return;
  locked = true;
  btn.classList.add('selected');
  const s = QS[currentQ].a[idx].s;
  TK.forEach(k => scores[k] += (s[k]||0));
  setTimeout(() => {
    currentQ++;
    if (currentQ >= QS.length) { showResult(); }
    else { renderQuestion(); }
  }, 350);
}

// ─── RESULT ───
function showResult() {
  const sorted = TK.map(k=>({k,s:scores[k]})).sort((a,b)=>b.s-a.s);
  const w = sorted[0], r = sorted[1];
  const wt = TYPES[w.k], rt = TYPES[r.k];
  const maxS = Math.max(...sorted.map(x=>x.s), 1);
  const kombi = getKombiText(w.k, r.k);

  // Radar
  const radarSVG = buildRadar(sorted, maxS);

  const container = document.getElementById('screen-result');
  container.innerHTML = `
    <div class="r-inner">
      <div class="r-reveal slide-up">
        <div class="r-label">Dein Zukunftstyp</div>
        <div class="r-emoji">${wt.emoji}</div>
        <div class="r-name">${wt.name}</div>
        <div class="r-sub">${wt.sub}</div>
      </div>

      <div class="r-card slide-up delay-1">
        <div class="r-desc">${getDescription(w.k)}</div>
        <div class="r-traits">${getTraits(w.k).map(t=>`<span class="r-trait" style="background:${wt.color}18;color:${wt.color}">${t}</span>`).join('')}</div>
      </div>

      <div class="r-kombi slide-up delay-2">
        <div class="r-kombi-head">
          <span>${wt.emoji}</span><span style="color:#a5b4fc;font-size:.9rem">+</span><span>${rt.emoji}</span>
          <span class="r-kombi-label">Deine Kombination</span>
        </div>
        <div class="r-kombi-text">„${kombi}"</div>
      </div>

      <div class="r-card slide-up delay-3">
        <div class="r-chart-title">Dein Zukunftsprofil</div>
        <div class="radar-wrap">${radarSVG}</div>
        <div class="r-bars" id="r-bars"></div>
      </div>

      <div class="r-card slide-up delay-4 r-actions">
        <button class="r-action-btn r-action-primary" onclick="showShareCard()">📸 Ergebnis-Karte anzeigen</button>
        <button class="r-action-btn r-action-secondary" style="background:#f1f5f9;color:#475569" onclick="copyLink()">📋 Quiz-Link kopieren</button>
        <button class="r-action-btn r-action-secondary" style="background:#f1f5f9;color:#475569" onclick="startQuiz()">🔄 Nochmal spielen</button>
        <div class="r-tip"><div class="r-tip-text">💡 Mach einen Screenshot — dann hast du dein Profil immer dabei.</div></div>
      </div>

      <div class="r-footer">Das Zukunftsquiz · 2026</div>
    </div>
  `;

  showScreen('result');

  // Animate bars
  setTimeout(() => {
    const barsEl = document.getElementById('r-bars');
    sorted.forEach((item,i) => {
      const t = TYPES[item.k];
      const pct = Math.round((item.s/maxS)*100);
      barsEl.innerHTML += `
        <div class="r-bar-row">
          <span class="r-bar-emoji">${t.emoji}</span>
          <span class="r-bar-name">${t.name.split('–')[0].split('—')[0].trim()}</span>
          <div class="r-bar-track"><div class="r-bar-fill" style="width:0%;background:${t.color}" id="bar-${item.k}"></div></div>
          <span class="r-bar-pct">${pct}%</span>
        </div>`;
    });
    // Trigger animation
    requestAnimationFrame(() => {
      sorted.forEach(item => {
        const el = document.getElementById('bar-'+item.k);
        if(el) el.style.width = Math.round((item.s/maxS)*100)+'%';
      });
    });
  }, 600);
}

// ─── RADAR CHART ───
function buildRadar(sorted, maxS) {
  const cx=150,cy=150,R=105;
  const angles = TK.map((_,i) => (360/7)*i);
  function p2xy(r,a){ const rad=(a-90)*Math.PI/180; return [cx+r*Math.cos(rad),cy+r*Math.sin(rad)]; }
  function poly(scale){ return TK.map((_,i)=>p2xy(R*scale,angles[i]).join(',')).join(' '); }

  const dataPoints = TK.map((k,i) => {
    const val = scores[k]/Math.max(maxS,1);
    return p2xy(R*Math.max(val,0.05),angles[i]).join(',');
  }).join(' ');

  const labels = TK.map((k,i) => {
    const [x,y] = p2xy(R+24,angles[i]);
    const t = TYPES[k];
    return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" font-size="8" font-weight="600" fill="${t.color}">${t.emoji}</text>`;
  }).join('');

  const dots = TK.map((k,i) => {
    const val = scores[k]/Math.max(maxS,1);
    const [x,y] = p2xy(R*Math.max(val,0.05),angles[i]);
    return `<circle cx="${x}" cy="${y}" r="4" fill="#8b5cf6" stroke="white" stroke-width="2"/>`;
  }).join('');

  return `<svg viewBox="0 0 300 300">
    <polygon points="${poly(1)}" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <polygon points="${poly(.66)}" fill="none" stroke="#e2e8f0" stroke-width=".5"/>
    <polygon points="${poly(.33)}" fill="none" stroke="#e2e8f0" stroke-width=".5"/>
    ${TK.map((_,i)=>{const[x,y]=p2xy(R,angles[i]);return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#e2e8f0" stroke-width=".5"/>`;}).join('')}
    <polygon points="${dataPoints}" fill="rgba(139,92,246,.15)" stroke="#8b5cf6" stroke-width="2.5"/>
    ${dots}${labels}
  </svg>`;
}

// ─── DESCRIPTIONS & TRAITS ───

  const d = {
    captain: "Du blickst hoffnungsvoll nach vorn und willst nicht nur mitreden, sondern aktiv mitgestalten. Zukunft ist für dich ein Möglichkeitsraum voller Chancen – und du packst an, damit sie Wirklichkeit wird.",
    fluxus: "Neugierig, kreativ und immer offen für Überraschungen. Die Zukunft ist dein Spielplatz – du probierst aus, staunst und findest im Chaos die besten Ideen.",
    techno: "Du glaubst an die Kraft der Technologie und siehst in KI, Daten und digitaler Vernetzung die Schlüssel für eine bessere Welt. Innovation ist für dich kein Buzzword, sondern Alltag.",
    oeko: "Für dich beginnt Zukunft mit der Erde. Du denkst in Kreisläufen, träumst von regenerativen Städten und weißt: Echte Innovation heißt, mit der Natur statt gegen sie zu arbeiten.",
    routinier: "Stabil, pragmatisch und stark im Hier und Jetzt verankert. Du weißt: Bevor man die Welt rettet, muss erstmal der Alltag laufen. Und der läuft bei dir.",
    retro: "Du schätzt Traditionen, bewährte Werte und das Analoge. Nicht alles Neue ist besser – und du hast den Mut, das laut zu sagen. Manchmal trotzig, aber nie ohne Haltung.",
    muessig: "Du musst gar nichts – und genau das ist deine Stärke. Souverän, gelassen und selbstbestimmt. Während andere optimieren, genießt du. Dein Nichtstun ist keine Schwäche, sondern eine Haltung."
  };
  return d[k]||'';
}
function getTraits(k) {
  const t = {
    captain:["Visionär","Gestaltungswillig","Optimistisch","Mutig"],
    fluxus:["Kreativ","Experimentierfreudig","Neugierig","Spontan"],
    techno:["Technikaffin","Innovativ","Datengetrieben","Vernetzt"],
    oeko:["Nachhaltig","Ganzheitlich","Naturverbunden","Regenerativ"],
    routinier:["Pragmatisch","Verlässlich","Alltagsstark","Realistisch"],
    retro:["Traditionsbewusst","Kritisch","Authentisch","Standhaft"],
    muessig:["Souverän","Gelassen","Selbstbestimmt","Autonom"]
  };
  return t[k]||[];
}

// ─── SHARE ───
function showShareCard() {
  const sorted = TK.map(k=>({k,s:scores[k]})).sort((a,b)=>b.s-a.s);
  const w = sorted[0], r = sorted[1];
  const wt = TYPES[w.k], rt = TYPES[r.k];
  const maxS = Math.max(...sorted.map(x=>x.s),1);
  const kombi = getKombiText(w.k, r.k);

  const ov = document.createElement('div');
  ov.className = 'share-overlay';
  ov.onclick = (e) => { if(e.target===ov) ov.remove(); };
  ov.innerHTML = `
    <div class="share-card">
      <div class="share-card-center">
        <div class="share-card-emoji">${wt.emoji}</div>
        <div class="share-card-name">${wt.name}</div>
        <div class="share-card-sub">${wt.sub}</div>
      </div>
      <div class="share-card-kombi">
        <div style="display:flex;align-items:center;gap:4px;margin-bottom:4px">
          <span style="font-size:1rem">${wt.emoji}</span>
          <span style="font-size:.7rem;color:#94a3b8">+</span>
          <span style="font-size:1rem">${rt.emoji}</span>
        </div>
        <div class="share-card-kombi-text">„${kombi}"</div>
      </div>
      <div class="share-card-types">
        ${TK.map(k=>{const t=TYPES[k];const pct=Math.round((scores[k]/maxS)*100);return `<div class="share-card-type"><span class="share-card-type-emoji">${t.emoji}</span><span class="share-card-type-pct" style="color:${t.color}">${pct}%</span></div>`;}).join('')}
      </div>
      <div class="share-card-footer">zukunftsquiz.de · 2026</div>
      <div class="share-card-tip">
        <div class="share-card-tip-text">📱 Screenshot machen & teilen!</div>
      </div>
      <button class="share-close" onclick="this.closest('.share-overlay').remove()">Schließen</button>
    </div>`;
  document.body.appendChild(ov);
}

function copyLink() {
  const url = window.location.href.split('?')[0];
  if(navigator.clipboard) {
    navigator.clipboard.writeText(url).then(()=>alert('Link kopiert!')).catch(()=>prompt('Link kopieren:',url));
  } else { prompt('Link kopieren:',url); }
}
